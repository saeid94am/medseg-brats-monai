# @package _global_
# Main training configuration.
# Override any value on the CLI: python train.py model=segresnet training.lr=5e-5

defaults:
  - model: dynunet        # configs/model/dynunet.yaml  (override: model=unet3d or model=segresnet)
  - _self_

data:
  data_dir: data/
  json_list: data/brats2023_splits.json
  cache_rate: 0.25        # fraction of training set cached to CPU RAM; reduce if RAM < 16 GB
  num_workers: 4

training:
  max_epochs: 300
  val_interval: 5         # run validation every N epochs
  batch_size: 1
  grad_accum_steps: 4     # effective batch size = batch_size * grad_accum_steps = 4
  lr: 1.0e-4
  weight_decay: 1.0e-5
  seed: 42
  amp: true               # FP16 mixed precision via torch.cuda.amp
  grad_checkpoint: true   # gradient checkpointing to save ~35% VRAM
  compile: false          # torch.compile(); disable on Windows without Triton

loss:
  name: dice_ce           # "dice_ce" or "dice_focal" (switch if ET Dice stagnates)
  focal_gamma: 2.0        # only used when loss.name == dice_focal

optimizer:
  name: adamw

scheduler:
  name: cosine_annealing_warm_restarts
  T_0: 50                 # epochs per cosine cycle
  T_mult: 1               # cycle length stays constant
  eta_min: 1.0e-6         # minimum LR at trough of cosine

inference:
  roi_size: [96, 96, 96]
  sw_batch_size: 1        # windows processed in parallel during sliding-window; keep at 1 for 4 GB VRAM
  overlap: 0.5
  mode: gaussian          # "gaussian" blends patches with Gaussian weights (reduces boundary artifacts)

wandb:
  project: medseg-brats-monai
  entity: null            # set via WANDB_ENTITY env var, or fill in your username here
  log_images: true        # log sample prediction overlays to W&B every val_interval epochs
  log_interval: 1         # log train metrics every N steps

output:
  results_dir: results/
  checkpoint_dir: results/checkpoints/
  metrics_dir: results/metrics/

debug_memory: false       # set true on first run to print VRAM usage per step
