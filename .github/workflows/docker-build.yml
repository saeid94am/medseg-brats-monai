name: Docker Build

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -f docker/Dockerfile -t medseg-brats:test .

      - name: Smoke test imports
        run: |
          docker run --rm medseg-brats:test \
            python -c "import medseg_brats; import monai; print('Imports OK')"
